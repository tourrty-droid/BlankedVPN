name: Update VPN subscriptions

on:
  schedule:
    # Каждые 30 минут (cron-синтаксис)
    - cron: '*/30 * * * *'
  workflow_dispatch:   # даёт возможность запустить вручную из интерфейса GitHub

permissions:
  contents: write     # разрешаем коммитить и пушить

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python update_sub.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update subscription from source"
          file_pattern: "Githubmirorr/Sub/BlankedVPN/sub.txt"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
