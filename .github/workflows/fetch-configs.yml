name: Fetch and Process VPN Configs

on:
  schedule:
    # Каждые 2 часа (в 0, 2, 4, ...)
    - cron: '0 */2 * * *'
  workflow_dispatch:  # ручной запуск

jobs:
  update-configs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python .github/scripts/update_configs.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Githubmirorr/Sub/BlankedVPN/sub8.txt
          git diff --staged --quiet || git commit -m "Auto-update VPN configs ($(date -u '+%Y-%m-%d %H:%M'))"
          git push
